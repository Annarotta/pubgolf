<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pub Golf ⛳</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:      #1a5c36;
  --green-mid:  #2a8c52;
  --green-light:#d4edda;
  --green-pale: #f0faf3;
  --amber:      #e8a020;
  --amber-light:#fff8e6;
  --cream:      #faf8f2;
  --ink:        #1a1a18;
  --muted:      #6b6b60;
  --border:     #d8d5cc;
  --red:        #c0392b;
  --red-light:  #ffd7d7;
  --radius:     16px;
}
body { background:var(--cream); font-family:'DM Sans',sans-serif; color:var(--ink); min-height:100dvh; overflow-x:hidden; }
.screen { display:none; min-height:100dvh; flex-direction:column; }
.screen.active { display:flex; }

/* SETUP */
#setup-screen { align-items:center; justify-content:center; padding:32px 24px; background:var(--green); position:relative; overflow:hidden; }
#setup-screen::before { content:''; position:absolute; width:400px; height:400px; border-radius:50%; border:60px solid rgba(255,255,255,0.04); top:-100px; right:-100px; }
#setup-screen::after  { content:''; position:absolute; width:300px; height:300px; border-radius:50%; border:40px solid rgba(255,255,255,0.04); bottom:-80px; left:-80px; }
.logo { font-family:'DM Serif Display',serif; font-size:52px; color:white; margin-bottom:4px; position:relative; z-index:1; }
.logo-sub { font-size:13px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.6); margin-bottom:32px; position:relative; z-index:1; }
.card { background:white; border-radius:20px; padding:28px 24px; width:100%; max-width:380px; position:relative; z-index:1; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
.lbl { font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; display:block; }
.inp { width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:16px; color:var(--ink); background:var(--cream); margin-bottom:20px; outline:none; transition:border-color 0.2s; }
.inp:focus { border-color:var(--green-mid); }
.sel { width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:16px; color:var(--ink); background:var(--cream); margin-bottom:20px; outline:none; appearance:none; }
.cap-row { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border:1.5px solid var(--border); border-radius:12px; margin-bottom:20px; }
.toggle { position:relative; width:48px; height:26px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; }
.ttrack { position:absolute; inset:0; background:var(--border); border-radius:13px; cursor:pointer; transition:background 0.2s; }
.ttrack::after { content:''; position:absolute; width:20px; height:20px; border-radius:50%; background:white; top:3px; left:3px; transition:transform 0.2s; box-shadow:0 1px 4px rgba(0,0,0,0.2); }
.toggle input:checked + .ttrack { background:var(--green-mid); }
.toggle input:checked + .ttrack::after { transform:translateX(22px); }
.big-btn { width:100%; padding:16px; background:var(--green); color:white; border:none; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:16px; font-weight:600; cursor:pointer; transition:transform 0.1s; }
.big-btn:active { transform:scale(0.97); }
.text-link { margin-top:14px; text-align:center; font-size:13px; color:var(--muted); cursor:pointer; text-decoration:underline; }

/* GAME HEADER */
.g-header { background:var(--green); padding:14px 20px 18px; color:white; flex-shrink:0; transition:background 0.4s; }
.g-header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.g-name { font-family:'DM Serif Display',serif; font-size:18px; }
.g-meta { font-size:11px; color:rgba(255,255,255,0.6); margin-top:1px; }
.pill { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); border-radius:30px; padding:5px 14px; font-size:12px; font-weight:600; cursor:pointer; display:flex; gap:10px; align-items:center; }
.pill-val { font-size:16px; line-height:1; }
.pill-lbl { font-size:9px; opacity:0.7; }
.prog-track { display:flex; gap:6px; }
.prog-dot { flex:1; height:4px; border-radius:2px; background:rgba(255,255,255,0.2); transition:background 0.3s; }
.prog-dot.done { background:white; }
.prog-dot.active { background:var(--amber); }

/* HOLE AREA */
.hole-area { flex:1; padding:16px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; }
.hole-top { background:white; border-radius:var(--radius); overflow:hidden; box-shadow:0 2px 16px rgba(0,0,0,0.06); }
.hole-hdr { padding:12px 18px; display:flex; justify-content:space-between; align-items:center; }
.hole-num-lbl { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.7); }
.hole-num { font-family:'DM Serif Display',serif; font-size:26px; color:white; line-height:1; }
.par-lbl { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.7); text-align:right; }
.par-num { font-family:'DM Serif Display',serif; font-size:28px; color:white; line-height:1; text-align:right; }
.hole-body { padding:14px 18px; }
.bar-name { font-family:'DM Serif Display',serif; font-size:20px; color:var(--green); margin-bottom:6px; }
.drink-badge { display:inline-flex; align-items:center; gap:5px; background:var(--green-pale); border:1px solid var(--green-light); border-radius:8px; padding:5px 10px; font-size:12px; font-weight:600; color:var(--green); }
.cap-badge { display:inline-flex; align-items:center; gap:5px; background:#fff3cd; border:1px solid var(--amber); border-radius:8px; padding:5px 10px; font-size:12px; font-weight:600; color:#7a4a00; margin-left:6px; }
.rule-card { background:var(--amber-light); border:1px solid var(--amber); border-radius:12px; padding:12px 14px; }
.rule-ttl { font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:#7a4a00; margin-bottom:4px; }
.rule-txt { font-size:13px; color:#5a3500; line-height:1.55; }

/* COUNTER */
.counter-card { background:white; border-radius:var(--radius); padding:18px; box-shadow:0 2px 16px rgba(0,0,0,0.06); }
.counter-ttl { font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); text-align:center; margin-bottom:14px; }
.counter-row { display:flex; align-items:center; justify-content:center; gap:16px; }
.cbtn { width:52px; height:52px; border-radius:50%; border:2px solid var(--border); background:var(--cream); font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.1s; user-select:none; -webkit-tap-highlight-color:transparent; }
.cbtn:active { transform:scale(0.9); }
.cbtn.plus { background:var(--green); border-color:var(--green); color:white; }
.cdisp { text-align:center; min-width:72px; }
.cnum { font-family:'DM Serif Display',serif; font-size:52px; line-height:1; }
.cres { font-size:12px; font-weight:600; margin-top:2px; padding:3px 10px; border-radius:20px; display:inline-block; }
.r-eagle{background:#d4edda;color:#1a5c36} .r-birdie{background:#c6e6c6;color:#1a5c36}
.r-par{background:#e9e9e9;color:#444} .r-bogey{background:#fff3cd;color:#7a4a00}
.r-double{background:#ffd7d7;color:#8b0000} .r-triple{background:#e8b4b4;color:#6b0000}
.r-empty{background:transparent;color:transparent}
.pen-section { margin-top:14px; border-top:1px solid #f0ede8; padding-top:12px; }
.pen-ttl { font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--red); text-align:center; margin-bottom:10px; }
.pen-row { display:flex; align-items:center; justify-content:center; gap:14px; }
.pbtn { width:44px; height:44px; border-radius:50%; border:2px solid var(--red); background:white; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--red); transition:all 0.1s; -webkit-tap-highlight-color:transparent; }
.pbtn:active { transform:scale(0.9); background:var(--red-light); }
.pnum { font-family:'DM Serif Display',serif; font-size:36px; color:var(--red); min-width:50px; text-align:center; }

/* ACTION CARDS */
.act-card { background:white; border-radius:var(--radius); padding:18px; box-shadow:0 2px 16px rgba(0,0,0,0.06); }
.act-ttl { font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
.act-btn { width:100%; padding:14px; border-radius:12px; border:none; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; margin-bottom:8px; transition:all 0.15s; -webkit-tap-highlight-color:transparent; display:block; }
.act-btn:last-child { margin-bottom:0; }
.act-btn:active { transform:scale(0.97); }
.btn-green { background:var(--green); color:white; }
.btn-ghost { background:var(--cream); border:1.5px solid var(--border); color:var(--muted); }
.btn-red   { background:var(--red); color:white; }
.btn-amber { background:var(--amber); color:#3a2000; }

/* WHEEL */
.wheel-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; }
.wheel-canvas-wrap { position:relative; }
.wheel-ptr { position:absolute; top:-14px; left:50%; transform:translateX(-50%); font-size:28px; z-index:10; pointer-events:none; }
.spin-btn { padding:14px 32px; background:var(--green); color:white; border:none; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:16px; font-weight:600; cursor:pointer; }
.spin-btn:disabled { background:var(--muted); cursor:not-allowed; }
.wheel-res { font-family:'DM Serif Display',serif; font-size:18px; color:var(--green); text-align:center; padding:12px 16px; background:var(--green-pale); border-radius:12px; border:1px solid var(--green-light); display:none; width:100%; }

/* HOLD OVERVIEW */
.hold-overview { background:white; border-radius:var(--radius); padding:16px 18px; box-shadow:0 2px 16px rgba(0,0,0,0.06); }
.hold-ov-ttl { font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
.hold-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f0ede8; }
.hold-row:last-child { border-bottom:none; }
.hold-rank { font-size:16px; width:28px; }
.hold-name { font-weight:600; font-size:14px; flex:1; }
.hold-score { font-family:'DM Serif Display',serif; font-size:20px; line-height:1; }
.hold-diff { font-size:11px; font-weight:600; min-width:40px; text-align:right; }
.hold-loading { text-align:center; padding:16px; color:var(--muted); font-size:13px; }

/* NAV */
.nav-row { display:flex; gap:10px; padding:12px 16px 24px; flex-shrink:0; }
.nbtn { flex:1; padding:15px; border-radius:14px; border:none; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.nbtn:active { transform:scale(0.97); }
.nprev { background:var(--cream); border:1.5px solid var(--border); color:var(--muted); }
.nnext { background:var(--green); color:white; }
.nnext.fin { background:var(--amber); color:#3a2000; }

/* RESULTS */
.res-hdr { background:var(--green); padding:28px 20px 22px; text-align:center; color:white; flex-shrink:0; }
.res-ttl  { font-family:'DM Serif Display',serif; font-size:32px; margin-bottom:4px; }
.res-plyr { font-size:13px; color:rgba(255,255,255,0.7); }
.res-scr  { font-family:'DM Serif Display',serif; font-size:64px; margin:10px 0 0; line-height:1; }
.res-dif  { font-size:15px; font-weight:600; margin-top:4px; padding:4px 16px; border-radius:20px; display:inline-block; background:rgba(255,255,255,0.15); }
.res-list { padding:16px; display:flex; flex-direction:column; gap:10px; flex:1; overflow-y:auto; }
.res-row  { background:white; border-radius:14px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 8px rgba(0,0,0,0.05); }
.res-left { display:flex; align-items:center; gap:12px; }
.res-hn   { width:30px; height:30px; background:var(--green-pale); color:var(--green); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:12px; flex-shrink:0; }
.res-bar  { font-weight:500; font-size:14px; }
.res-drk  { font-size:11px; color:var(--muted); }
.res-pen  { font-size:11px; color:var(--red); }
.res-right{ text-align:right; }
.res-s    { font-family:'DM Serif Display',serif; font-size:20px; line-height:1; }
.res-badge{ font-size:11px; font-weight:600; margin-top:2px; }
.res-acts { display:flex; gap:10px; padding:0 16px 28px; flex-shrink:0; }
.rabtn { flex:1; padding:15px; border-radius:14px; border:none; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; }
.ra-lb { background:var(--green); color:white; }
.ra-re { background:var(--cream); border:1.5px solid var(--border); color:var(--muted); }

/* LEADERBOARD */
.lb-hdr { background:var(--green); padding:18px 20px 0; color:white; flex-shrink:0; }
.lb-hdr-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.lb-ttl { font-family:'DM Serif Display',serif; font-size:24px; }
.lb-back { background:rgba(255,255,255,0.15); border:none; color:white; border-radius:10px; padding:7px 14px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; }
.lb-tabs { display:flex; background:rgba(0,0,0,0.2); border-radius:10px 10px 0 0; padding:4px 4px 0; }
.lb-tab  { flex:1; padding:9px; text-align:center; border-radius:8px 8px 0 0; font-size:13px; font-weight:600; cursor:pointer; color:rgba(255,255,255,0.6); transition:all 0.2s; border:none; background:transparent; font-family:'DM Sans',sans-serif; }
.lb-tab.active { background:var(--cream); color:var(--green); }
.lb-body { padding:16px; display:flex; flex-direction:column; gap:10px; overflow-y:auto; flex:1; }
.lb-card { background:white; border-radius:14px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.05); }
.lb-ch   { padding:12px 16px; background:var(--green-pale); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--green-light); }
.lb-tnm  { font-weight:600; font-size:15px; color:var(--green); }
.lb-tdif { font-size:11px; font-weight:600; margin-top:1px; }
.lb-ttot { font-family:'DM Serif Display',serif; font-size:24px; color:var(--green); }
.lb-mem  { display:flex; justify-content:space-between; align-items:center; padding:10px 16px; border-bottom:1px solid #f0ede8; }
.lb-mem:last-child { border-bottom:none; }
.lb-mn   { font-size:14px; font-weight:500; }
.lb-ms   { font-size:11px; color:var(--muted); }
.lb-mr   { text-align:right; }
.lb-msc  { font-family:'DM Serif Display',serif; font-size:20px; line-height:1; }
.lb-mdf  { font-size:11px; font-weight:600; }
.rank    { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
.r1{background:#FFD700;color:#3a2000} .r2{background:#C0C0C0;color:#333} .r3{background:#CD7F32;color:white}
.rn{background:var(--cream);color:var(--muted);font-size:11px}
.lb-empty { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }
.lb-refr  { display:flex; align-items:center; justify-content:center; gap:8px; padding:14px; color:var(--muted); font-size:13px; font-weight:500; cursor:pointer; border-top:1px solid var(--border); flex-shrink:0; }
.lb-refr:active { color:var(--green); }

/* LOADER */
.loader { position:fixed; inset:0; background:rgba(26,92,54,0.92); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; color:white; }
.spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:16px; }
.spin-sm { width:20px; height:20px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }
.hidden { display:none !important; }
</style>
</head>
<body>

<div class="loader hidden" id="loader">
  <div class="spinner"></div>
  <div style="font-size:15px;font-weight:500" id="loader-txt">Gemmer...</div>
</div>

<!-- SETUP -->
<div id="setup-screen" class="screen active">
  <div class="logo">⛳</div>
  <p class="logo-sub">Pub Golf</p>
  <div class="card">
    <span class="lbl">Dit navn</span>
    <input class="inp" id="inp-name" type="text" placeholder="fx Anna" maxlength="30" autocomplete="off">
    <span class="lbl">Dit hold</span>
    <select class="sel" id="inp-team">
      <option>Hold 1</option><option>Hold 2</option><option>Hold 3</option><option>Hold 4</option>
    </select>
    <div class="cap-row">
      <div>
        <div style="font-size:15px">🏌️ Holdkaptajn</div>
        <div style="font-size:12px;color:var(--muted)">Kaptajnen spinner hjulet på Klovnen</div>
      </div>
      <label class="toggle"><input type="checkbox" id="cap-tog"><span class="ttrack"></span></label>
    </div>
    <button class="big-btn" onclick="startGame()">Start runden →</button>
    <div class="text-link" onclick="openLb()">Se leaderboard →</div>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="g-header" id="g-header">
    <div class="g-header-top">
      <div><div class="g-name" id="hdr-name">—</div><div class="g-meta" id="hdr-meta"></div></div>
      <div class="pill" onclick="openLb()">
        <div><div class="pill-val" id="hdr-tot">0</div><div class="pill-lbl">SLAG</div></div>
        <div style="opacity:0.4">|</div>
        <div><div class="pill-val" id="hdr-pen" style="color:#ffb3b3">0</div><div class="pill-lbl">STRAF</div></div>
      </div>
    </div>
    <div class="prog-track" id="prog-track"></div>
  </div>
  <div class="hole-area" id="hole-area"></div>
  <div class="nav-row">
    <button class="nbtn nprev" id="btn-prev" onclick="nav(-1)">← Tilbage</button>
    <button class="nbtn nnext" id="btn-next" onclick="nav(1)">Næste hul →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results-screen" class="screen">
  <div class="res-hdr">
    <div class="res-ttl">Runden slut! 🏁</div>
    <div class="res-plyr" id="r-plyr">—</div>
    <div class="res-scr"  id="r-scr">—</div>
    <div class="res-dif"  id="r-dif">—</div>
  </div>
  <div class="res-list" id="r-list"></div>
  <div class="res-acts">
    <button class="rabtn ra-lb" onclick="openLb()">🏆 Leaderboard</button>
    <button class="rabtn ra-re" onclick="restart()">Spil igen</button>
  </div>
</div>

<!-- LEADERBOARD -->
<div id="lb-screen" class="screen">
  <div class="lb-hdr">
    <div class="lb-hdr-top">
      <div class="lb-ttl">🏆 Leaderboard</div>
      <button class="lb-back" onclick="closeLb()">← Tilbage</button>
    </div>
    <div class="lb-tabs">
      <button class="lb-tab active" onclick="setTab('hold')">Hold</button>
      <button class="lb-tab" onclick="setTab('individual')">Individuel</button>
    </div>
  </div>
  <div class="lb-body" id="lb-body"><div class="lb-empty">Henter scores...</div></div>
  <div class="lb-refr" onclick="loadLb()">↻ &nbsp;Opdater leaderboard</div>
</div>

<script>
/* ══ CONFIG ══════════════════════════════════════════════════════════════ */
const API_KEY = '$2a$10$pzdQ595ZXXiFINPyL5NRXOymulC1..wI88YDPwVL5fDu/imlKM7Xy';
const BIN_NAME = 'pubgolf-scores';
let BIN_ID = localStorage.getItem('pgBinId') || null;

const HOLES = [
  { n:1, bar:"Ozburne",   drink:"En flaske øl",    par:4, bg:"#1a5c36",
    rNm:"Team Spirit 🥂",
    rule:"Hver gang du tager en tår, skal hele holdet skåle — og derefter må du drikke. Er du den sidste der drikker, skal du skåle med en anden gruppe.",
    hasPen:false, hasBong:false, hasWheel:false },
  { n:2, bar:"Brus",      drink:"Valgfri fadøl",   par:5, bg:"#185c4a",
    rNm:"Silent 🤫",
    rule:"Når du har fået din øl, må du ikke sige et ord, før glasset er tomt. Enhver lyd = strafsslag.",
    hasPen:true,  hasBong:false, hasWheel:false },
  { n:3, bar:"Tempelbar", drink:"Valgfri øl",      par:5, bg:"#2a4a1a",
    rNm:"Caddy 🏌️",
    rule:"Du må ikke selv holde din øl, mens du drikker — en holdkammerat skal holde glasset for dig. Holder du selv = strafsslag.",
    hasPen:true,  hasBong:false, hasWheel:false },
  { n:4, bar:"Dega",      drink:"Drink (valgfri)", par:6, bg:"#3a1a6b",
    rNm:"Redemption 🍺",
    rule:"Alle får en drink. Men der er chance for redemption: én fra hvert hold dyster i ølbong. Den hurtigste giver −2 slag til hele holdet. Vandt dit hold?",
    hasPen:false, hasBong:true,  hasWheel:false },
  { n:5, bar:"Klovnen",   drink:"Spin the wheel!", par:5, bg:"#6b1a1a",
    rNm:"Last Man Laughing 😂",
    rule:"Kaptajnen spinner hjulet — hele holdet bestiller det samme. Du må ikke grine. Griner du → strafsslag.",
    hasPen:true,  hasBong:false, hasWheel:true  },
];
const TOTAL_PAR  = HOLES.reduce((s,h)=>s+h.par,0);
const WHEEL_OPTS = ["Skinny bitch 🍸","Mørk øl 🍺","Guinness 🖤","Et andet hold bestemmer 🎯"];
const WHEEL_CLR  = ["#1a5c36","#3a1a6b","#222222","#8b1a1a"];

/* ══ STATE ═══════════════════════════════════════════════════════════════ */
let holeIdx=0, scores=Array(5).fill(null), penalties=Array(5).fill(0);
let bongRes=Array(5).fill(null), wheelRes=Array(5).fill(null);
let pName="", pTeam="", pCap=false, prevScr="setup-screen", lbTab="hold";
let spinning=false, wheelAngle=0;

/* ══ JSONBIN API ══════════════════════════════════════════════════════════ */
async function ensureBin() {
  if (BIN_ID) return BIN_ID;
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'X-Access-Key':API_KEY, 'X-Bin-Name':BIN_NAME, 'X-Bin-Private':'false' },
      body: JSON.stringify({ scores: [] })
    });
    const d = await r.json();
    BIN_ID = d.metadata.id;
    localStorage.setItem('pgBinId', BIN_ID);
    return BIN_ID;
  } catch(e) { return null; }
}

async function readBin() {
  const id = await ensureBin();
  if (!id) return { scores: [] };
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, {
      headers: { 'X-Access-Key': API_KEY }
    });
    const d = await r.json();
    return d.record || { scores: [] };
  } catch(e) { return { scores: [] }; }
}

async function writeBin(data) {
  const id = await ensureBin();
  if (!id) return;
  await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type':'application/json', 'X-Access-Key':API_KEY },
    body: JSON.stringify(data)
  });
}

async function saveScore() {
  const current = await readBin();
  const existing = current.scores || [];
  // Remove old entry from same player if exists
  const filtered = existing.filter(p => !(p.name===pName && p.team===pTeam));
  filtered.push({
    name:pName, team:pTeam, cap:pCap,
    scores, penalties, bongRes,
    total: calcTotal(),
    updatedAt: Date.now()
  });
  await writeBin({ scores: filtered });
}

async function fetchAll() {
  try {
    const data = await readBin();
    return data.scores || [];
  } catch(e) { return []; }
}

/* ══ HELPERS ═════════════════════════════════════════════════════════════ */
function resInfo(s,par){
  if(s===null)return{lbl:"—",cls:"r-empty"};
  const d=s-par;
  if(d<=-2)return{lbl:"Eagle 🦅",cls:"r-eagle"};
  if(d===-1)return{lbl:"Birdie 🐦",cls:"r-birdie"};
  if(d===0) return{lbl:"Par ⛳",cls:"r-par"};
  if(d===1) return{lbl:"Bogey 😅",cls:"r-bogey"};
  if(d===2) return{lbl:"Double bogey 😬",cls:"r-double"};
  return{lbl:"Triple+ ☠️",cls:"r-triple"};
}
function effScore(i,sc=scores,pen=penalties,br=bongRes){
  if(sc[i]===null)return 0;
  const base=(sc[i]??0)+(pen[i]??0);
  return(i===3&&br[i]==="win")?base-2:base;
}
function calcTotal(sc=scores,pen=penalties,br=bongRes){
  return sc.reduce((a,v,i)=>a+(v!==null?effScore(i,sc,pen,br):0),0);
}
function totalPen(){return penalties.reduce((a,b)=>a+b,0);}
function dStr(s,p){const d=s-p;return d===0?"Par":d>0?`+${d}`:`${d}`;}
function dClr(s,p){const d=s-p;return d<0?"#1a5c36":d>0?"#c0392b":"#555";}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function loading(on,txt=""){document.getElementById("loader-txt").textContent=txt;document.getElementById("loader").classList.toggle("hidden",!on);}

/* ══ SETUP ═══════════════════════════════════════════════════════════════ */
function startGame(){
  pName=document.getElementById("inp-name").value.trim();
  if(!pName){alert("Skriv dit navn 😊");return;}
  pTeam=document.getElementById("inp-team").value;
  pCap=document.getElementById("cap-tog").checked;
  holeIdx=0;scores=Array(5).fill(null);penalties=Array(5).fill(0);
  bongRes=Array(5).fill(null);wheelRes=Array(5).fill(null);
  buildProg();renderHole();show("game-screen");prevScr="game-screen";
}

/* ══ PROGRESS ════════════════════════════════════════════════════════════ */
function buildProg(){
  document.getElementById("prog-track").innerHTML=HOLES.map((_,i)=>`<div class="prog-dot" id="pd${i}"></div>`).join("");
}
function updProg(){
  HOLES.forEach((_,i)=>{const d=document.getElementById(`pd${i}`);d.className="prog-dot"+(i<holeIdx?" done":i===holeIdx?" active":"");});
}
function updHeader(){
  document.getElementById("hdr-name").textContent=pName+(pCap?" 🏌️":"");
  document.getElementById("hdr-meta").textContent=pTeam;
  document.getElementById("hdr-tot").textContent=calcTotal();
  document.getElementById("hdr-pen").textContent=totalPen();
}

/* ══ RENDER HOLE ══════════════════════════════════════════════════════════ */
function renderHole(){
  updHeader();updProg();
  const h=HOLES[holeIdx];
  document.getElementById("g-header").style.background=h.bg;
  const cnt=scores[holeIdx]??0, pen=penalties[holeIdx]??0;
  const info=resInfo(cnt,h.par);
  const capBadge=(pCap&&holeIdx===4)?`<span class="cap-badge">🏌️ Du er kaptajn</span>`:"";

  const penHtml=h.hasPen?`<div class="pen-section">
    <div class="pen-ttl">Strafsslag</div>
    <div class="pen-row">
      <button class="pbtn" onclick="chgPen(-1)">−</button>
      <div class="pnum" id="g-pen">${pen}</div>
      <button class="pbtn" onclick="chgPen(1)">+</button>
    </div></div>`:"";

  const won=bongRes[holeIdx]==="win", lost=bongRes[holeIdx]==="lose";
  const bongHtml=h.hasBong?`<div class="act-card">
    <div class="act-ttl">Ølbong udfordring 🍺</div>
    <button class="act-btn ${won?"btn-green":"btn-ghost"}" onclick="setBong('win')">${won?"✅ Vandt! (−2 slag til holdet)":"Dit hold vandt ølbong → −2 slag"}</button>
    <button class="act-btn ${lost?"btn-red":"btn-ghost"}" onclick="setBong('lose')">${lost?"❌ Tabte ølbong":"Dit hold tabte ølbong"}</button>
  </div>`:"";

  let wheelHtml="";
  if(h.hasWheel){
    const spinned=wheelRes[holeIdx];
    if(pCap){
      wheelHtml=`<div class="act-card">
        <div class="act-ttl">Spin the wheel! 🎡</div>
        <div class="wheel-wrap">
          <div class="wheel-canvas-wrap">
            <div class="wheel-ptr">▼</div>
            <canvas id="wcanvas" width="260" height="260"></canvas>
          </div>
          <button class="spin-btn" id="spin-btn" onclick="doSpin()">🎡 Spin!</button>
          <div class="wheel-res" id="wres">${spinned?"Hele holdet drikker: "+spinned:""}</div>
        </div>
      </div>`;
    } else {
      wheelHtml=`<div class="act-card">
        <div class="act-ttl">🎡 Kaptajnen spinner hjulet</div>
        <div style="text-align:center;padding:12px;color:var(--muted);font-size:14px" id="wheel-watcher">
          ${spinned?`Hele holdet drikker:<br><strong style="color:var(--green);font-size:18px">${spinned}</strong>`:'<div class="spin-sm"></div> &nbsp;Vent på kaptajnens spin...'}
        </div>
      </div>`;
    }
  }

  // Hold overview (fetched async)
  const holdOvHtml=`<div class="hold-overview">
    <div class="hold-ov-ttl">🏆 Stillingen</div>
    <div id="hold-ov-body"><div class="hold-loading">Henter stillingen...</div></div>
  </div>`;

  document.getElementById("hole-area").innerHTML=`
    <div class="hole-top">
      <div class="hole-hdr" style="background:${h.bg}">
        <div><div class="hole-num-lbl">Hul</div><div class="hole-num">${h.n}</div></div>
        <div><div class="par-lbl">Par</div><div class="par-num">${h.par}</div></div>
      </div>
      <div class="hole-body">
        <div class="bar-name">${h.bar}</div>
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:4px">
          <span class="drink-badge">🍹 ${h.drink}</span>${capBadge}
        </div>
      </div>
    </div>
    <div class="rule-card"><div class="rule-ttl">Regel: ${h.rNm}</div><div class="rule-txt">${h.rule}</div></div>
    <div class="counter-card">
      <div class="counter-ttl">Antal slurke</div>
      <div class="counter-row">
        <button class="cbtn" onclick="chg(-1)">−</button>
        <div class="cdisp">
          <div class="cnum" id="g-cnt">${cnt}</div>
          <div class="cres ${cnt>0?info.cls:'r-empty'}" id="g-res">${cnt>0?info.lbl:"—"}</div>
        </div>
        <button class="cbtn plus" onclick="chg(1)">+</button>
      </div>
      ${penHtml}
    </div>
    ${bongHtml}
    ${wheelHtml}
    ${holdOvHtml}
  `;

  // Load hold overview async
  loadHoldOverview();

  if(pCap&&holeIdx===4){
    requestAnimationFrame(()=>drawWheel(wheelAngle));
    if(wheelRes[holeIdx]){const el=document.getElementById("wres");if(el)el.style.display="block";}
  }

  document.getElementById("btn-prev").style.visibility=holeIdx===0?"hidden":"visible";
  const nb=document.getElementById("btn-next");
  const last=holeIdx===HOLES.length-1;
  nb.textContent=last?"Afslut runden 🏁":"Næste hul →";
  nb.classList.toggle("fin",last);
}

/* ══ HOLD OVERVIEW (async) ════════════════════════════════════════════════ */
async function loadHoldOverview(){
  const body=document.getElementById("hold-ov-body");
  if(!body)return;
  try{
    const players=await fetchAll();
    if(!players.length){body.innerHTML=`<div class="hold-loading">Ingen scores endnu</div>`;return;}
    const teams={};
    players.forEach(p=>{if(!teams[p.team])teams[p.team]=[];teams[p.team].push(p);});
    const arr=Object.entries(teams).map(([tn,ms])=>({
      name:tn,
      total:ms.reduce((s,m)=>s+m.total,0),
      par:ms.length*TOTAL_PAR
    })).sort((a,b)=>a.total-b.total);
    const medals=["🥇","🥈","🥉","4️⃣"];
    body.innerHTML=arr.map((t,i)=>{
      const dc=dClr(t.total,t.par);
      return`<div class="hold-row">
        <div class="hold-rank">${medals[i]||i+1}</div>
        <div class="hold-name">${t.name}</div>
        <div>
          <div class="hold-score">${t.total}</div>
        </div>
        <div class="hold-diff" style="color:${dc}">${dStr(t.total,t.par)}</div>
      </div>`;
    }).join("");
  }catch(e){if(body)body.innerHTML=`<div class="hold-loading">Kunne ikke hente stillingen</div>`;}
}

/* ══ COUNTER ═════════════════════════════════════════════════════════════ */
function chg(d){
  const n=Math.max(0,(scores[holeIdx]??0)+d);
  scores[holeIdx]=n;
  const info=resInfo(n,HOLES[holeIdx].par);
  const c=document.getElementById("g-cnt");if(c)c.textContent=n;
  const r=document.getElementById("g-res");if(r){r.textContent=n>0?info.lbl:"—";r.className="cres "+(n>0?info.cls:"r-empty");}
  updHeader();
}
function chgPen(d){
  penalties[holeIdx]=Math.max(0,(penalties[holeIdx]??0)+d);
  const el=document.getElementById("g-pen");if(el)el.textContent=penalties[holeIdx];
  updHeader();
}
function setBong(res){bongRes[holeIdx]=res;renderHole();}

/* ══ WHEEL ═══════════════════════════════════════════════════════════════ */
function drawWheel(angle){
  const cv=document.getElementById("wcanvas");if(!cv)return;
  const ctx=cv.getContext("2d");
  const cx=130,cy=130,r=122,arc=(Math.PI*2)/WHEEL_OPTS.length;
  ctx.clearRect(0,0,260,260);
  WHEEL_OPTS.forEach((opt,i)=>{
    const start=angle+i*arc-Math.PI/2;
    const end=start+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);
    ctx.fillStyle=WHEEL_CLR[i%WHEEL_CLR.length];ctx.fill();
    ctx.strokeStyle="white";ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+arc/2);
    ctx.textAlign="right";ctx.fillStyle="white";ctx.font="bold 11px 'DM Sans',sans-serif";
    const words=opt.split(" ");let line="",y=-6;
    words.forEach((w,wi)=>{
      const t=line+(wi>0?" ":"")+w;
      if(t.length>11&&wi>0){ctx.fillText(line,r-8,y);line=w;y+=14;}else line=t;
    });
    ctx.fillText(line,r-8,y);ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,12,0,Math.PI*2);ctx.fillStyle="white";ctx.fill();
}

function doSpin(){
  if(spinning)return;spinning=true;
  const btn=document.getElementById("spin-btn");if(btn)btn.disabled=true;
  const totalRot=Math.PI*2*(6+Math.random()*6),dur=4000,start=performance.now(),sa=wheelAngle;
  function frame(now){
    const t=Math.min((now-start)/dur,1);
    // Ease out cubic
    const ease=1-(1-t)*(1-t)*(1-t);
    wheelAngle=sa+totalRot*ease;
    drawWheel(wheelAngle);
    if(t<1){requestAnimationFrame(frame);return;}
    // Fix: pointer is at top = -PI/2 in standard coords
    // Normalize angle so 0 = pointer position
    const arc=(Math.PI*2)/WHEEL_OPTS.length;
    const norm=(((-wheelAngle+Math.PI/2)%( Math.PI*2))+(Math.PI*2))%(Math.PI*2);
    const idx=Math.floor(norm/arc)%WHEEL_OPTS.length;
    const result=WHEEL_OPTS[idx];
    wheelRes[holeIdx]=result;
    const el=document.getElementById("wres");
    if(el){el.style.display="block";el.textContent="Hele holdet drikker: "+result;}
    spinning=false;if(btn)btn.disabled=false;
  }
  requestAnimationFrame(frame);
}

/* ══ NAVIGATION ══════════════════════════════════════════════════════════ */
function nav(d){
  const n=holeIdx+d;if(n<0)return;
  if(n>=HOLES.length){finishRound();return;}
  holeIdx=n;renderHole();
}

/* ══ FINISH ══════════════════════════════════════════════════════════════ */
async function finishRound(){
  loading(true,"Gemmer din score...");
  try{await saveScore();}catch(e){}
  loading(false);showResults();prevScr="results-screen";
}
function showResults(){
  show("results-screen");
  const tot=calcTotal(),diff=tot-TOTAL_PAR;
  document.getElementById("r-plyr").textContent=`${pName} · ${pTeam}${pCap?" 🏌️":""}`;
  document.getElementById("r-scr").textContent=tot;
  document.getElementById("r-dif").textContent=diff===0?"Par":diff>0?`+${diff} over par`:`${Math.abs(diff)} under par`;
  document.getElementById("r-list").innerHTML=HOLES.map((h,i)=>{
    const s=scores[i],p=penalties[i]??0,eff=effScore(i);
    const info=resInfo(s,h.par);
    const bNote=i===3&&bongRes[i]==="win"?" (−2 bong)":"";
    const pNote=p>0?`<div class="res-pen">+${p} strafsslag</div>`:"";
    return`<div class="res-row">
      <div class="res-left"><div class="res-hn">${i+1}</div>
        <div><div class="res-bar">${h.bar}</div><div class="res-drk">${h.drink} · par ${h.par}</div>${pNote}</div></div>
      <div class="res-right">
        <div class="res-s">${s!==null?eff:"—"}${bNote}</div>
        <div class="res-badge ${info.cls}">${s!==null?info.lbl:"—"}</div>
      </div></div>`;
  }).join("");
}

/* ══ LEADERBOARD ══════════════════════════════════════════════════════════ */
function openLb(){prevScr=document.querySelector(".screen.active")?.id||"game-screen";show("lb-screen");loadLb();}
function closeLb(){show(prevScr);}
function setTab(t){
  lbTab=t;
  document.querySelectorAll(".lb-tab").forEach((el,i)=>el.classList.toggle("active",(i===0&&t==="hold")||(i===1&&t==="individual")));
  renderLb(window._lbP||[]);
}
async function loadLb(){
  document.getElementById("lb-body").innerHTML=`<div class="lb-empty"><div class="spinner" style="margin:0 auto 12px"></div>Henter scores...</div>`;
  const players=await fetchAll();
  window._lbP=players;
  renderLb(players);
}
function renderLb(players){
  const body=document.getElementById("lb-body");
  if(!players.length){body.innerHTML=`<div class="lb-empty">Ingen scores endnu — vær den første! 🏌️</div>`;return;}
  if(lbTab==="individual"){
    const sorted=[...players].sort((a,b)=>a.total-b.total);
    body.innerHTML=sorted.map((p,idx)=>{
      const rc=["r1","r2","r3"][idx]||"rn",rl=["🥇","🥈","🥉"][idx]||(idx+1);
      const played=p.scores.filter(s=>s!==null).length,dc=dClr(p.total,TOTAL_PAR);
      return`<div class="lb-card"><div style="display:flex;align-items:center;gap:12px;padding:14px 16px">
        <div class="rank ${rc}">${rl}</div>
        <div style="flex:1"><div style="font-weight:600;font-size:15px">${p.name}${p.cap?" 🏌️":""}</div>
        <div style="font-size:11px;color:var(--muted)">${p.team} · ${played}/5 huller</div></div>
        <div style="text-align:right"><div style="font-family:'DM Serif Display',serif;font-size:24px;line-height:1">${p.total}</div>
        <div style="font-size:12px;font-weight:600;color:${dc}">${dStr(p.total,TOTAL_PAR)}</div></div>
      </div></div>`;
    }).join("");
  } else {
    const teams={};
    players.forEach(p=>{if(!teams[p.team])teams[p.team]=[];teams[p.team].push(p);});
    const arr=Object.entries(teams).map(([tn,ms])=>({name:tn,members:ms,total:ms.reduce((s,m)=>s+m.total,0),tpar:ms.length*TOTAL_PAR})).sort((a,b)=>a.total-b.total);
    body.innerHTML=arr.map((t,ti)=>{
      const rc=["r1","r2","r3"][ti]||"rn",rl=["🥇","🥈","🥉"][ti]||(ti+1);
      const dc=dClr(t.total,t.tpar);
      const mRows=[...t.members].sort((a,b)=>a.total-b.total).map(m=>{
        const played=m.scores.filter(s=>s!==null).length,mdc=dClr(m.total,TOTAL_PAR);
        return`<div class="lb-mem">
          <div><div class="lb-mn">${m.name}${m.cap?" 🏌️":""}</div><div class="lb-ms">${played}/5 huller</div></div>
          <div class="lb-mr"><div class="lb-msc">${m.total}</div><div class="lb-mdf" style="color:${mdc}">${dStr(m.total,TOTAL_PAR)}</div></div>
        </div>`;
      }).join("");
      return`<div class="lb-card">
        <div class="lb-ch">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="rank ${rc}">${rl}</div>
            <div><div class="lb-tnm">${t.name}</div><div class="lb-tdif" style="color:${dc}">${dStr(t.total,t.tpar)} · ${t.members.length} spillere</div></div>
          </div>
          <div class="lb-ttot">${t.total}</div>
        </div>${mRows}</div>`;
    }).join("");
  }
}

function restart(){document.getElementById("inp-name").value="";document.getElementById("cap-tog").checked=false;show("setup-screen");prevScr="setup-screen";}
</script>
